components:
  cdn_picker:
    type: object
    label: CDN Tool
    fields:
      - name: url
        label: "https://cdn.jsdelivr.net/gh/Blueky-Hub/blueky@main/media/images/"
        type: image
        media: images

content:
  - name: gallery
    label: Media Gallery
    type: collection
    path: content/gallery
    format: json
    fields:
      - name: title
        type: string
      - name: media_asset
        label: "Quản lý ảnh"
        component: cdn_picker