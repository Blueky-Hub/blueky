components:
  cdn_picker:
    type: object
    label: CDN Tool
    fields:
      - name: url
        label: "Link jsDelivr (Chọn ảnh xong sẽ hiện ở đây)"
        type: image
        # Chỉ định dùng đúng kho media 'images' đã cấu hình public_url
        media: images

content:
  - name: gallery
    label: Media Gallery
    type: collection
    path: content/gallery
    format: json
    fields:
      - name: title
        type: string
      - name: media_asset
        label: "Quản lý ảnh"
        component: cdn_picker