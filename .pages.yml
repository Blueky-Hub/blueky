# 1. CẤU HÌNH MEDIA
media:
  - name: images
    label: Images
    input: assets/img
    output: /media/images
    rename: safe
    extensions: [png, jpg, webp]

# 2. CẤU HÌNH COMPONENTS (Để tái sử dụng bộ lấy link)
components:
  cdn_link_tool:
    type: object
    label: "Bộ lấy link jsDelivr"
    fields:
      - name: prefix
        label: "Bước 1: Copy tiền tố này"
        type: string
        # Đây là link gốc cố định của bạn
        default: "https://cdn.jsdelivr.net/gh/Blueky-Hub/blueky@main/"
      
      - name: image_file
        label: "Bước 2: Chọn ảnh (Đường dẫn sẽ hiện bên dưới)"
        type: image
        media: images

# 3. CẤU HÌNH CONTENT
content:
  - name: posts
    label: Posts
    type: collection
    path: content/posts
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text

  - name: gallery
    label: "Media Gallery (Copy Link)"
    type: collection
    path: content/gallery
    format: json
    fields:
      - name: title
        label: "Tên gợi nhớ"
        type: string
      - name: get_link
        label: "Công cụ lấy URL"
        component: cdn_link_tool